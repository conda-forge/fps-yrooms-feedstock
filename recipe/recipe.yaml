schema_version: 1

context:
  version: "0.2.2"

package:
  name: fps-yrooms
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/f/fps-yrooms/fps_yrooms-${{ version }}.tar.gz
    sha256: 68779ff8c2ee2c34343ed36d906a7ff0d75a4af1f4b549a52f9ea8b759266944

build:
  noarch: python
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - anyio
    - fps
    - jupyter_ydoc >=3.4.0,<4.0.0
    - jupyverse-api >=0.15.0,<0.16.0
    - jupyverse-contents >=0.1.0,<0.2.0
    - jupyverse-file-id >=0.1.0,<0.2.0
    - jupyverse-yrooms >=0.1.1,<0.2.0
    - jupyverse-ystore >=0.1.0,<0.2.0
    - pycrdt
    - pydantic
    - structlog

tests:
  - python:
      imports: fps_yrooms
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  license: BSD-3-Clause
  license_file: COPYING.md
  homepage: https://github.com/jupyter-server/jupyverse/tree/main/plugins/yrooms
  summary: An FPS plugin for YRooms.

extra:
  recipe-maintainers:
    - davidbrochart
